{% extends "layout.html" %}

{% block title %}
    Join a Group Chat
{% endblock %}

{% block main %}
<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .fadeIn { animation: fadeIn 0.5s ease-in-out; }
    .zoomIn { transition: transform 0.2s; }
    .zoomIn:hover { transform: scale(1.05); }
    .recent-group-btn {
        background: #2b2d31;
        color: #dcddde;
        border: 1px solid #3f4147;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
        text-align: left;
        width: 100%;
        transition: background 0.15s;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .recent-group-btn:hover { background: #404249; }
    .recent-dropdown {
        background: #2b2d31;
        border: 1px solid #3f4147;
        border-radius: 8px;
        padding: 6px;
        margin-top: 8px;
        max-height: 220px;
        overflow-y: auto;
    }
    .recent-dropdown::-webkit-scrollbar { width: 6px; }
    .recent-dropdown::-webkit-scrollbar-thumb { background: #3f4147; border-radius: 4px; }
</style>

<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="text-center fadeIn" style="width: 100%; max-width: 400px; padding: 0 16px;">
        <h1 class="mb-4">Join a Group Chat</h1>
        <form action="/chat" method="post">
            <div class="mb-3">
                <input class="form-control" name="key" id="keyInput" placeholder="Enter group code" type="text" required autocomplete="off">
            </div>
            <button class="btn btn-primary zoomIn w-100 mb-2" type="submit">Join Chat</button>
            {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
            {% endif %}
        </form>

        {% if recent_groups %}
        <div class="mt-4 text-start">
            <p class="text-muted mb-2" style="font-size:13px;"><i class="bi bi-clock-history"></i> Your recent groups:</p>
            <div class="recent-dropdown">
                {% for group_id in recent_groups %}
                <button type="button" class="recent-group-btn" onclick="joinGroup('{{ group_id }}')">
                    <i class="bi bi-hash"></i> {{ group_id }}
                </button>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <a class="btn btn-secondary mt-3 zoomIn w-100" href="/">Back to Home</a>
    </div>
</div>

<script>
function joinGroup(groupId) {
    document.getElementById('keyInput').value = groupId;
    document.querySelector('form').submit();
}
</script>
{% endblock %}
